name: calculate_math
description: "Mathematical operations via Newton API: simplify, factor, derive, integrate, cos, sin, tan, log, abs."
endpoint: "https://newton.now.sh/api/v2/{operation}/{expression}"
method: GET
parameters:
  operation:
    type: string
    required: true
    location: path
    description: "Operation: simplify, factor, derive, integrate, cos, sin, tan, log, abs"
  expression:
    type: string
    required: true
    location: path
    description: "Math expression (URL-encoded)"
response_transform: "$.result"
status: verified
