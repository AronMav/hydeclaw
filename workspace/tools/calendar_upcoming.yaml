name: calendar_upcoming
description: "Show upcoming calendar events. Defaults to the next 7 days."
endpoint: "http://localhost:9011/primitives/google_calendar/events/list"
method: POST
parameters:
  days:  { type: integer, required: false, location: body, description: "(ignored, primitive defaults to next 7 days)", default: 7 }
  limit: { type: integer, required: false, location: body, description: "Maximum events", default: 20 }
body_template: |
  {
    "sa_key_json": "${GOOGLE_SA_KEY_JSON}",
    "calendar_id": "${GOOGLE_CALENDAR_ID}",
    "max_results": {{limit}}
  }
response_transform: "$.events"
status: draft
