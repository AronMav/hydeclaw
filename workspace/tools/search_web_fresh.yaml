name: search_web_fresh
description: "Web search via Brave Search API — broad indexing, fresh content. Use when search_web returned insufficient results or fresh news is needed."
endpoint: "https://api.search.brave.com/res/v1/web/search"
method: GET
parallel: true
parameters:
  q:
    type: string
    required: true
    location: query
    description: "Search query"
  count:
    type: integer
    required: false
    location: query
    description: "Number of results (default: 10)"
    default: 10
auth:
  type: api_key_header
  header_name: X-Subscription-Token
  key: BRAVE_SEARCH_API_KEY
response_transform: "$.web.results"

status: verified
