name: tavily_search
description: "AI-optimized web search via Tavily. Returns clean, extracted page content ready for LLM consumption. Best for research requiring full page content, not just links. Requires TAVILY_API_KEY secret."
endpoint: "https://api.tavily.com/search"
method: POST
auth:
  type: bearer_env
  key: TAVILY_API_KEY
body_template: '{"query":"{{query}}","search_depth":"{{search_depth}}","include_answer":true,"max_results":5}'
parameters:
  query:
    type: string
    required: true
    description: "Search query"
  search_depth:
    type: string
    default: "basic"
    description: "'basic' for fast search, 'advanced' for deeper extraction with content"
response_transform: "$.results"

status: draft
