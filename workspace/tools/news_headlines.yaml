name: news_headlines
description: "Top Russian news headlines from NewsAPI. Fetches top headlines for Russia with optional category filter."
endpoint: "https://newsapi.org/v2/top-headlines"
method: GET
parameters:
  country:
    type: string
    location: query
    default: "ru"
    description: "Country code (ISO 3166-1 alpha-2). Use 'ru' for Russia."
  category:
    type: string
    location: query
    description: "News category"
    enum: ["business", "technology", "science", "health", "sports", "entertainment"]
  pageSize:
    type: integer
    location: query
    default: 10
    description: "Number of results per page (1-100)"
auth:
  type: api_key_query
  param_name: apiKey
  key: NEWS_API_KEY
response_transform: "$.articles"
status: draft
