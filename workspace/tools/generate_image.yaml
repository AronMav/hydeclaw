name: generate_image
description: "Generate images from a text description via FLUX (fal.ai). Use for illustrations, diagrams, and art. The prompt must be in English. NOTE: the image is displayed in chat automatically — do NOT use canvas or other tools to show it."
endpoint: "http://localhost:9011/generate-image"
method: POST
parameters:
  prompt:
    type: string
    required: true
    location: body
    description: "Image description in English"
  size:
    type: string
    required: false
    location: body
    description: "Size: 1024x1024 (square), 1792x1024 (wide), 1024x1792 (tall), 512x512 (fast)"
    default: "1024x1024"
  quality:
    type: string
    required: false
    location: body
    description: "standard (fast) or high (28 steps, slower but better quality)"
    default: "standard"
channel_action:
  action: send_photo
  data_field: "_binary"
status: verified
tags: ["image", "generation", "flux", "art"]
