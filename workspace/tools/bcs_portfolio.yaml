name: bcs_portfolio
description: "Get portfolio from BCS World of Investments. Returns positions (stocks, bonds, currency), balances, and P&L. OAuth authorization is automatic."
endpoint: "http://localhost:9011/primitives/bcs/portfolio"
method: POST
parallel: true
required_secrets:
  - BCS_REFRESH_TOKEN
parameters: {}
body_template: |
  {
    "refresh_token": "${BCS_REFRESH_TOKEN}"
  }
status: verified
tags: ["bcs", "portfolio", "investments"]
