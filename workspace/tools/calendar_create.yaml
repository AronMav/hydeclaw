name: calendar_create
description: "Create an event in Google Calendar. CONFIRM with the user the date, time, and subject before creating."
endpoint: "http://localhost:9011/primitives/google_calendar/events/create"
method: POST
parameters:
  summary:     { type: string, required: true,  location: body, description: "Event title" }
  start:       { type: string, required: true,  location: body, description: "Start time in ISO 8601 format" }
  end:         { type: string, required: true,  location: body, description: "End time in ISO 8601 format" }
  description: { type: string, required: false, location: body, description: "Event description" }
  location:    { type: string, required: false, location: body, description: "Event location" }
  timezone:    { type: string, required: false, location: body, description: "Timezone", default: "Europe/Samara" }
body_template: |
  {
    "sa_key_json": "${GOOGLE_SA_KEY_JSON}",
    "calendar_id": "${GOOGLE_CALENDAR_ID}",
    "summary":     "{{summary}}",
    "start":       "{{start}}",
    "end":         "{{end}}",
    "description": "{{description}}",
    "location":    "{{location}}",
    "timezone":    "{{timezone}}"
  }
response_transform: "$.event"
status: draft
