name: email_search
description: "Search emails by subject or content."
endpoint: "http://localhost:9011/email/search"
method: GET
parameters:
  query:
    type: string
    required: true
    location: query
    description: "Search query"
  folder:
    type: string
    required: false
    location: query
    description: "Folder"
    default: "INBOX"
  limit:
    type: integer
    required: false
    location: query
    description: "Maximum results"
    default: 10
response_transform: "$.messages"
status: draft
